<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Apple Container Operator mechanical arm icon candidate</title>
  <desc id="desc">A restrained mechanical arm and clamp operating a clean container icon from the outside.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="52" x2="424" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFF"/>
      <stop offset="1" stop-color="#E7EBF2"/>
    </linearGradient>
    <linearGradient id="containerBody" x1="218" y1="118" x2="412" y2="388" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFE"/>
      <stop offset="0.46" stop-color="#C8D0DE"/>
      <stop offset="1" stop-color="#737D91"/>
    </linearGradient>
    <linearGradient id="containerInset" x1="244" y1="142" x2="377" y2="324" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCE2EC"/>
    </linearGradient>
    <linearGradient id="steel" x1="93" y1="303" x2="286" y2="193" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2630"/>
